name: Daily Hukamnama

on:
  schedule:
    # 8:30 AM IST (03:00 UTC) — primary
    - cron: "0 3 * * *"
    # 9:30 AM IST (04:00 UTC) — fallback if the first run missed
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  send-hukamnama:
    runs-on: ubuntu-latest
    # Images + hukamnama audio + compressed katha can take 15–30 minutes.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sent-cache
        uses: actions/cache/restore@v4
        id: sent-cache
        with:
          path: hukamnama/.sent-cache
          key: sent-cache
          restore-keys: |
            sent-cache

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore fonts cache
        uses: actions/cache/restore@v4
        id: fonts-cache
        with:
          path: hukamnama/.fonts
          key: fonts-cache
          restore-keys: |
            fonts-cache

      - name: Send daily hukamnama
        env:
          WHATSAPP_ID_INSTANCE: ${{ secrets.WHATSAPP_ID_INSTANCE }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
        # Loads hukamnama/config.env automatically; secrets from GitHub Secrets above.
        run: python -m hukamnama.send --enforce-sent-check

      - name: Save fonts cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: hukamnama/.fonts
          key: fonts-cache

      - name: Save sent-cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: hukamnama/.sent-cache
          key: sent-cache