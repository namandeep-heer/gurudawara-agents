name: Daily Hukamnama

on:
  schedule:
    # 8:00 AM IST (02:30 UTC) — primary; hukamnama is available by then in India
    - cron: "30 2 * * *"
    # 9:00 AM IST (03:30 UTC) — fallback if the first run missed
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  send-hukamnama:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sent-cache
        uses: actions/cache/restore@v4
        id: sent-cache
        with:
          path: .sent-cache
          key: sent-cache
          restore-keys: |
            sent-cache

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore fonts cache
        uses: actions/cache/restore@v4
        id: fonts-cache
        with:
          path: .fonts
          key: fonts-cache
          restore-keys: |
            fonts-cache

      - name: Load configuration from repo
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%%#*}"
            line="$(echo "$line" | xargs)"
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done < .github/repo-config.env

      - name: Send daily hukamnama
        env:
          WHATSAPP_ID_INSTANCE: ${{ secrets.WHATSAPP_ID_INSTANCE }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
        run: python send_hukamnama.py

      - name: Save fonts cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .fonts
          key: fonts-cache

      - name: Save sent-cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .sent-cache
          key: sent-cache