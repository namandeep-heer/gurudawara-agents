name: Daily Hukamnama

on:
  schedule:
    # 8:00 AM IST (02:30 UTC) — primary; hukamnama is available by then in India
    - cron: "30 2 * * *"
    # 9:00 AM IST (03:30 UTC) — fallback if the first run missed
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  send-hukamnama:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sent-cache
        uses: actions/cache/restore@v4
        id: sent-cache
        with:
          path: .sent-cache
          key: sent-cache
          restore-keys: |
            sent-cache

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore fonts cache
        uses: actions/cache/restore@v4
        id: fonts-cache
        with:
          path: .fonts
          key: fonts-cache
          restore-keys: |
            fonts-cache

      - name: Send daily hukamnama
        env:
          DELIVERY_METHOD: ${{ vars.DELIVERY_METHOD || 'telegram' }}
          SEND_FORMAT: ${{ vars.SEND_FORMAT || 'auto' }}
          DRY_RUN: ${{ vars.DRY_RUN || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_ID_INSTANCE: ${{ secrets.WHATSAPP_ID_INSTANCE }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_GROUP_IDS: ${{ secrets.WHATSAPP_GROUP_IDS }}
          WHATSAPP_GROUPS_FILE: ${{ vars.WHATSAPP_GROUPS_FILE || 'whatsapp_groups.json' }}
          WHATSAPP_API_URL: ${{ vars.WHATSAPP_API_URL || 'https://api.green-api.com' }}
          WHATSAPP_MEDIA_URL: ${{ vars.WHATSAPP_MEDIA_URL || 'https://media.green-api.com' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}
          SENT_CACHE_DIR: .sent-cache
          FONTS_DIR: .fonts
          IMAGE_OUTPUT_DIR: .generated-images
          INCLUDE_PUNJABI: ${{ vars.INCLUDE_PUNJABI || 'true' }}
          INCLUDE_HINDI: ${{ vars.INCLUDE_HINDI || '' }}
          INCLUDE_ENGLISH: ${{ vars.INCLUDE_ENGLISH || '' }}
        run: python send_hukamnama.py

      - name: Save fonts cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .fonts
          key: fonts-cache

      - name: Save sent-cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .sent-cache
          key: sent-cache